
<style>
*{box-sizing:border-box;margin:0;padding:0}
.stage{display:flex;justify-content:center;padding:16px 0 24px;background:#EFEDE6;border-radius:16px}
.phone{width:320px;height:640px;border-radius:38px;border:7px solid #2C2C2A;background:#fff;display:flex;flex-direction:column;overflow:hidden}
.status-bar{background:#fff;padding:10px 20px 4px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.status-time{font-size:12px;font-weight:500;color:#1A1A18}
.status-icons{display:flex;gap:5px;font-size:11px;color:#1A1A18}
.app-header{background:#fff;border-bottom:0.5px solid #E8E6DF;padding:8px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-logo{display:flex;align-items:center;gap:7px}
.logo-dot{width:26px;height:26px;border-radius:8px;background:#FAC775;display:flex;align-items:center;justify-content:center;font-size:13px}
.app-name{font-size:15px;font-weight:500;color:#1A1A18}
.icon-btn{background:none;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B6A65;font-size:15px}
.screen{flex:1;overflow:hidden;display:none;flex-direction:column}
.screen.active{display:flex}
.feed-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.feed-area::-webkit-scrollbar{display:none}
.post-card{background:#fff;border:0.5px solid #E8E6DF;border-radius:14px;overflow:hidden}
.card-img{width:100%;height:160px;object-fit:cover;display:block}
.card-info{padding:9px 11px 8px}
.card-comment{font-size:13px;color:#1A1A18;line-height:1.5;margin-bottom:7px}
.card-meta{display:flex;justify-content:space-between;align-items:center}
.meta-store{display:flex;align-items:center;gap:5px}
.store-tag{font-size:10px;font-weight:500;background:#FAEEDA;color:#633806;padding:2px 7px;border-radius:10px}
.meta-time{font-size:10px;color:#9B9990}
.like-btn{background:none;border:0.5px solid #E8E6DF;border-radius:12px;padding:3px 8px;font-size:11px;cursor:pointer;color:#6B6A65;display:flex;align-items:center;gap:3px;line-height:1}
.like-btn.liked{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.bottom-nav{background:#fff;border-top:0.5px solid #E8E6DF;padding:8px 0 14px;display:flex;align-items:center;justify-content:space-around;flex-shrink:0}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 20px;color:#9B9990;font-size:10px}
.nav-btn.active{color:#BA7517}
.nav-icon{font-size:18px;line-height:1}
.nav-post-btn{width:48px;height:48px;border-radius:24px;background:#BA7517;border:none;cursor:pointer;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 2px 10px rgba(186,117,23,.35)}
.post-screen{flex:1;display:none;flex-direction:column;background:#fff}
.post-screen.active{display:flex}
.post-header{padding:12px 16px;border-bottom:0.5px solid #E8E6DF;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#6B6A65;padding:0 4px}
.post-title-text{font-size:15px;font-weight:500;color:#1A1A18;flex:1}
.do-post-btn{background:#BA7517;color:#fff;border:none;border-radius:16px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer}
.do-post-btn:disabled{opacity:.4}
.post-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.post-body::-webkit-scrollbar{display:none}

/* 画像ゾーン：input を label でラップして確実にファイル選択を開く */
.img-label{display:block;cursor:pointer;border:1.5px dashed #D0CEC6;border-radius:14px;height:180px;background:#F5F4F0;position:relative;overflow:hidden;transition:border-color .15s}
.img-label:hover{border-color:#EF9F27}
.img-label.filled{border-style:solid;border-color:#EF9F27}
.img-label input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.img-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;pointer-events:none}
.img-placeholder span{font-size:28px;color:#9B9990}
.img-placeholder p{font-size:12px;color:#6B6A65}
.img-preview-el{width:100%;height:100%;object-fit:cover;display:block}
.img-change-hint{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;border-radius:8px;padding:2px 8px;pointer-events:none}

.comment-field input{width:100%;border:0.5px solid #E8E6DF;border-radius:10px;padding:10px 12px;font-size:14px;color:#1A1A18;font-family:inherit;background:#fff;outline:none}
.comment-field input:focus{border-color:#EF9F27}
.auto-tags{display:flex;gap:6px;flex-wrap:wrap}
.auto-tag{font-size:11px;color:#6B6A65;background:#F5F4F0;border:0.5px solid #E8E6DF;border-radius:10px;padding:4px 9px;display:flex;align-items:center;gap:4px}
.settings-screen{flex:1;display:none;flex-direction:column}
.settings-screen.active{display:flex}
.settings-body{flex:1;padding:16px 14px;display:flex;flex-direction:column;gap:14px}
.set-label{font-size:12px;color:#6B6A65;margin-bottom:5px;font-weight:500}
.set-input{width:100%;border:0.5px solid #E8E6DF;border-radius:10px;padding:10px 12px;font-size:14px;color:#1A1A18;font-family:inherit;background:#fff;outline:none}
.set-input:focus{border-color:#EF9F27}
.save-btn{width:100%;padding:13px;background:#BA7517;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.empty-feed{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#6B6A65;font-size:13px;text-align:center;padding:20px}
.empty-feed .big{font-size:36px}
</style>

<div class="stage">
  <div class="phone">
    <div class="status-bar">
      <span class="status-time" id="clockDisplay">9:41</span>
      <div class="status-icons"><span>●●●</span><span>▲</span><span>▮</span></div>
    </div>
    <div class="app-header">
      <div class="app-logo">
        <div class="logo-dot">⭐</div>
        <span class="app-name">販売事例シェア</span>
      </div>
      <button class="icon-btn" onclick="showSettings()">⚙</button>
    </div>

    <!-- フィード画面 -->
    <div class="screen active" id="feedScreen">
      <div class="feed-area" id="feedArea"></div>
      <div class="bottom-nav">
        <button class="nav-btn active" onclick="showFeed()"><span class="nav-icon">⌂</span>ホーム</button>
        <button class="nav-post-btn" onclick="showPost()">+</button>
        <button class="nav-btn" onclick="showSettings()"><span class="nav-icon">⚙</span>設定</button>
      </div>
    </div>

    <!-- 投稿画面 -->
    <div class="post-screen" id="postScreen">
      <div class="post-header">
        <button class="back-btn" onclick="showFeed()">←</button>
        <span class="post-title-text">新しい投稿</span>
        <button class="do-post-btn" id="doPostBtn" onclick="submitPost()">投稿</button>
      </div>
      <div class="post-body">
        <!-- label で input を包む → クリック確実 -->
        <label class="img-label" id="imgLabel">
          <input type="file" id="fileInput" accept="image/*">
          <div class="img-placeholder" id="imgPlaceholder">
            <span>📷</span>
            <p>タップして写真を選ぶ（任意）</p>
          </div>
        </label>

        <div class="comment-field">
          <input type="text" id="commentInput" placeholder="一言コメントを入力..." maxlength="80">
        </div>
        <div class="auto-tags">
          <div class="auto-tag">🕐 <span id="autoTime">--</span></div>
          <div class="auto-tag">📍 <span id="autoStore">--</span></div>
        </div>
      </div>
    </div>

    <!-- 設定画面 -->
    <div class="settings-screen" id="settingsScreen">
      <div class="post-header">
        <button class="back-btn" onclick="showFeed()">←</button>
        <span class="post-title-text">設定</span>
      </div>
      <div class="settings-body">
        <div>
          <div class="set-label">店舗名 / 部署名</div>
          <input class="set-input" type="text" id="storeInput" placeholder="例：新宿店、第2営業部">
        </div>
        <button class="save-btn" onclick="saveStore()">保存する</button>
      </div>
    </div>
  </div>
</div>

<script>
let posts = [];
let storeName = '';
let previewUrl = null;

// 時計
function clock() {
  const d = new Date();
  document.getElementById('clockDisplay').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
clock(); setInterval(clock, 30000);

function nowLabel() {
  const d = new Date();
  return d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 1) return 'たった今';
  if (diff < 60) return diff + '分前';
  if (diff < 1440) return Math.floor(diff/60) + '時間前';
  if (diff < 2880) return '昨日';
  return new Date(iso).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
}

// ストレージ
async function load() {
  try {
    const r = await window.storage.get('sale_posts_v1', true);
    if (r && r.value) posts = JSON.parse(r.value);
    const s = await window.storage.get('sale_store', false);
    if (s && s.value) storeName = s.value;
  } catch(e) {}
  renderFeed();
}
async function savePosts() {
  try { await window.storage.set('sale_posts_v1', JSON.stringify(posts), true); } catch(e) {}
}

// フィード描画
function renderFeed() {
  const area = document.getElementById('feedArea');
  const sorted = [...posts].sort((a,b) => new Date(b.date) - new Date(a.date));
  if (!sorted.length) {
    area.innerHTML = '<div class="empty-feed"><div class="big">🌟</div>まだ投稿がありません<br>最初の事例を投稿しましょう！</div>';
    return;
  }
  area.innerHTML = sorted.map(p => `
    <div class="post-card">
      ${p.img ? `<img class="card-img" src="${p.img}" alt="">` : ''}
      <div class="card-info">
        ${p.comment ? `<div class="card-comment">${esc(p.comment)}</div>` : ''}
        <div class="card-meta">
          <div class="meta-store">
            <span class="store-tag">📍 ${esc(p.store||'不明')}</span>
            <span class="meta-time">${fmtDate(p.date)}</span>
          </div>
          <button class="like-btn${p.liked?' liked':''}" onclick="like('${p.id}')">
            ${p.liked?'★':'☆'} ${p.likes}
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function like(id) {
  const p = posts.find(x => x.id === id); if (!p) return;
  p.liked = !p.liked; p.likes += p.liked ? 1 : -1;
  await savePosts(); renderFeed();
}

// 画面遷移
function showFeed() {
  document.getElementById('feedScreen').classList.add('active');
  document.getElementById('postScreen').classList.remove('active');
  document.getElementById('settingsScreen').classList.remove('active');
}
function showPost() {
  previewUrl = null;
  document.getElementById('commentInput').value = '';
  // ファイル入力リセット
  const fi = document.getElementById('fileInput');
  fi.value = '';
  // プレビューをリセット
  const lbl = document.getElementById('imgLabel');
  lbl.classList.remove('filled');
  document.getElementById('imgPlaceholder').style.display = 'flex';
  // 既存のプレビュー画像を削除
  const old = lbl.querySelector('.img-preview-el');
  if (old) old.remove();
  const hint = lbl.querySelector('.img-change-hint');
  if (hint) hint.remove();

  document.getElementById('autoTime').textContent = nowLabel();
  document.getElementById('autoStore').textContent = storeName || '店舗未設定';
  document.getElementById('feedScreen').classList.remove('active');
  document.getElementById('postScreen').classList.add('active');
  document.getElementById('settingsScreen').classList.remove('active');
}
function showSettings() {
  document.getElementById('storeInput').value = storeName;
  document.getElementById('feedScreen').classList.remove('active');
  document.getElementById('postScreen').classList.remove('active');
  document.getElementById('settingsScreen').classList.add('active');
}

async function saveStore() {
  const v = document.getElementById('storeInput').value.trim();
  if (!v) return;
  storeName = v;
  try { await window.storage.set('sale_store', storeName, false); } catch(e) {}
  showFeed();
}

// ファイル選択イベント（DOM構築後に一度だけ登録）
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const scale = Math.min(1, 900 / img.width);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      previewUrl = canvas.toDataURL('image/jpeg', 0.80);

      const lbl = document.getElementById('imgLabel');
      // 既存プレビューを削除
      const oldImg = lbl.querySelector('.img-preview-el');
      if (oldImg) oldImg.remove();
      const oldHint = lbl.querySelector('.img-change-hint');
      if (oldHint) oldHint.remove();

      // プレビュー画像を追加
      const preview = document.createElement('img');
      preview.className = 'img-preview-el';
      preview.src = previewUrl;
      lbl.appendChild(preview);

      // 変更ヒント
      const hint = document.createElement('div');
      hint.className = 'img-change-hint';
      hint.textContent = 'タップして変更';
      lbl.appendChild(hint);

      document.getElementById('imgPlaceholder').style.display = 'none';
      lbl.classList.add('filled');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

async function submitPost() {
  const comment = document.getElementById('commentInput').value.trim();
  if (!previewUrl && !comment) return;
  const btn = document.getElementById('doPostBtn');
  btn.disabled = true; btn.textContent = '投稿中...';
  posts.unshift({
    id: 'p' + Date.now(),
    img: previewUrl || null,
    comment,
    store: storeName || '不明',
    date: new Date().toISOString(),
    likes: 0,
    liked: false
  });
  await savePosts();
  showFeed(); renderFeed();
  btn.disabled = false; btn.textContent = '投稿';
}

load();
</script>
